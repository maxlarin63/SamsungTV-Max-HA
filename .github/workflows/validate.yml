name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest \
            pytest-asyncio \
            pytest-homeassistant-custom-component \
            pytest-socket \
            ruff \
            aiohttp \
            wakeonlan \
            voluptuous

      - name: Lint (ruff)
        run: ruff check custom_components/

      - name: Enforce version bump on deployables
        run: python scripts/check_version_bump.py

      - name: Test
        run: pytest tests/ -v
