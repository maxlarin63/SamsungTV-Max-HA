send_key:
  name: Send Key
  description: >
    Send one or more remote key commands to the TV.
    Key names follow the Samsung Tizen convention, e.g. KEY_VOLUMEUP, KEY_MUTE.
  fields:
    entry_id:
      name: Entry ID
      description: Target config entry ID. Omit to broadcast to all Samsung TV Max entries.
      selector:
        text:
    key:
      name: Key
      description: "Key name, e.g. KEY_POWER, KEY_VOLUMEUP, KEY_ENTER."
      required: true
      example: KEY_VOLUMEUP
      selector:
        text:
    count:
      name: Repeat count
      description: Number of times to send the key (default 1, max 20).
      default: 1
      selector:
        number:
          min: 1
          max: 20

launch_app:
  name: Launch App
  description: >
    Launch an installed app on the TV by name or app ID.
    Use enumerate_apps first to discover available apps.
  fields:
    entry_id:
      name: Entry ID
      description: Target config entry ID. Omit to broadcast to all Samsung TV Max entries.
      selector:
        text:
    app_id:
      name: App ID
      description: "Tizen app ID, e.g. 111299001912 (YouTube)."
      example: "111299001912"
      selector:
        text:
    app_name:
      name: App Name
      description: "Display name of the app, e.g. YouTube."
      example: YouTube
      selector:
        text:

enumerate_apps:
  name: Enumerate Apps
  description: >
    Trigger a fresh scan of installed apps on the TV.
    Results are stored in the remote entity's apps attribute and
    the media player's source_list.  A samsungtv_max_apps_updated
    event is fired on the HA event bus when complete.
  fields:
    entry_id:
      name: Entry ID
      description: Target config entry ID. Omit to broadcast to all Samsung TV Max entries.
      selector:
        text:

hold_key:
  name: Hold Key
  description: >
    Simulate a long press: sends Press, waits for the specified duration
    (TV auto-repeats the key), then sends Release. Useful for volume,
    channel, and arrow keys from dashboard hold_action.
  fields:
    entry_id:
      name: Entry ID
      description: Target config entry ID. Omit to broadcast to all Samsung TV Max entries.
      selector:
        text:
    key:
      name: Key
      description: "Key name, e.g. KEY_VOLUMEUP, KEY_UP."
      required: true
      example: KEY_VOLUMEUP
      selector:
        text:
    duration:
      name: Duration
      description: How long to hold the key in seconds (default 0.5, max 5.0).
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
          unit_of_measurement: s

send_text:
  name: Send Text
  description: >
    Type text into the focused on-screen input field on the TV (e.g. browser URL bar,
    search box).  Works when the TV signals an active text field (ms.remote.imeStart).
    The remote entity attribute "keyboard_active" indicates whether a field is focused.
  fields:
    entry_id:
      name: Entry ID
      description: Target config entry ID. Omit to broadcast to all Samsung TV Max entries.
      selector:
        text:
    text:
      name: Text
      description: "The text string to send (e.g. a URL like https://example.com)."
      required: true
      example: "https://www.google.com"
      selector:
        text:
