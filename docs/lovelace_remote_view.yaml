# Samsung TV Max — Lovelace remote panel (Grid + Button, stock cards only)
#
# Layout matches the integration remote: power row, D-pad, transport, app shortcuts,
# and a text-input row (for browser URL bar / search) that appears when keyboard_active.
#
# ── Placeholders (replace before pasting) ──────────────────────────────────
#   REPLACE_SHORT_NAME   → short label for the view tab (e.g. K45)
#   REPLACE_SLUG         → URL slug, lowercase no spaces (e.g. k45)
#   REPLACE_REMOTE       → your remote entity id       (e.g. remote.samsung_k45_remote)
#   REPLACE_PLAYER       → your media_player entity id (e.g. media_player.samsung_k45)
#   REPLACE_KBD_SENSOR   → your binary_sensor id       (e.g. binary_sensor.samsung_k45_keyboard_active)
#   REPLACE_ENTRY_ID     → your config entry id        (Developer Tools → States → remote entity → config_entry_id)
#   REPLACE_SCRIPT       → per-TV script entity         (e.g. script.tv_send_text_samsung_k45)
#
# TIP: run samsungtv_max.generate_dashboard service to get a fully resolved
# YAML with all placeholders pre-filled (output appears in HA Notifications).
#
# The entry_id is REQUIRED when you have more than one Samsung TV Max instance.
# Without it, samsungtv_max.* services broadcast to ALL TVs.
# With a single TV you may omit the entry_id lines (they are harmless if present).
#
# ── Prerequisites for text input (Rows 2–3, conditional) ──────────────────
#   1. Create ONE shared input_text helper (only once, shared across all TVs):
#      → Settings → Devices → Helpers → Text → name: "TV Text Input"
#      → entity_id: input_text.tv_text_input
#   2. Create a script PER TV (Settings → Automations → Scripts → Add Script → YAML):
#
#        alias: "TV Send Text — REPLACE_SHORT_NAME"
#        sequence:
#          - service: samsungtv_max.send_text
#            data:
#              text: "{{ states('input_text.tv_text_input') }}"
#              entry_id: "REPLACE_ENTRY_ID"
#          - service: input_text.set_value
#            target:
#              entity_id: input_text.tv_text_input
#            data:
#              value: ""
#
#   3. Paste this YAML into Dashboard → Raw Configuration (or merge the views: key).
#
views:
  - title: "TV REPLACE_SHORT_NAME"
    path: tv-REPLACE_SLUG
    icon: mdi:television
    type: masonry
    cards:
      - type: vertical-stack
        cards:
          # ── Row 1: Power & Menu ─────────────────────────────────────────────
          - type: grid
            columns: 2
            square: false
            cards:
              - type: button
                entity: &samsungtv_remote REPLACE_REMOTE
                name: "ON"
                icon: mdi:power
                show_state: true
                tap_action:
                  action: call-service
                  service: remote.toggle
                  target:
                    entity_id: *samsungtv_remote
              - type: button
                name: Menu
                icon: mdi:menu
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_MENU

          # ── Row 2–3: Keyboard text input (visible when TV text field focused) ─
          # Requires: input_text.tv_text_input helper + script.tv_send_text (see header).
          # The binary_sensor turns on/off with ms.remote.imeStart / imeEnd.
          - type: conditional
            conditions:
              - entity: REPLACE_KBD_SENSOR
                state: "on"
            card:
              type: vertical-stack
              cards:
                - type: entities
                  entities:
                    - entity: input_text.tv_text_input
                      name: "Type URL / text"
                - type: grid
                  columns: 2
                  square: false
                  cards:
                    - type: button
                      name: Send
                      icon: mdi:send
                      tap_action:
                        action: call-service
                        service: REPLACE_SCRIPT
                    - type: button
                      name: Clear
                      icon: mdi:close-circle-outline
                      tap_action:
                        action: call-service
                        service: input_text.set_value
                        target:
                          entity_id: input_text.tv_text_input
                        data:
                          value: ""

          # ── Row 4: Vol+ / Mute / CH+ ───────────────────────────────────────
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                name: Vol +
                icon: mdi:volume-plus
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_VOLUP
              - type: button
                name: Mute
                icon: mdi:volume-off
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_MUTE
              - type: button
                name: CH up
                icon: mdi:arrow-up-bold
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_CHUP

          # ── Row 5: Vol− / Source / CH− ─────────────────────────────────────
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                name: Vol −
                icon: mdi:volume-minus
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_VOLDOWN
              - type: button
                name: Source
                icon: mdi:video-input-hdmi
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_SOURCE
              - type: button
                name: CH dn
                icon: mdi:arrow-down-bold
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_CHDOWN

          # ── Row 6: Home / Up / Info ────────────────────────────────────────
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                name: Home
                icon: mdi:home
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_HOME
              - type: button
                icon: mdi:arrow-up
                show_name: false
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_UP
              - type: button
                name: Info
                icon: mdi:information
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_INFO

          # ── Row 7: Left / OK / Right ────────────────────────────────────────
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                icon: mdi:arrow-left
                show_name: false
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_LEFT
              - type: button
                name: OK
                icon: mdi:keyboard-return
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_ENTER
              - type: button
                icon: mdi:arrow-right
                show_name: false
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_RIGHT

          # ── Row 8: Back / Down / Exit ────────────────────────────────────────
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                name: Back
                icon: mdi:keyboard-backspace
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_RETURN
              - type: button
                icon: mdi:arrow-down
                show_name: false
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_DOWN
              - type: button
                name: Exit
                icon: mdi:close
                tap_action:
                  action: call-service
                  service: remote.send_command
                  target:
                    entity_id: *samsungtv_remote
                  data:
                    command: KEY_EXIT

          # ── Row 9: Transport (media player services) ─────────────────────────
          - type: grid
            columns: 5
            square: false
            cards:
              - type: button
                entity: &samsungtv_player REPLACE_PLAYER
                name: Play
                icon: mdi:play
                tap_action:
                  action: call-service
                  service: media_player.media_play
                  target:
                    entity_id: *samsungtv_player
              - type: button
                entity: *samsungtv_player
                name: Pause
                icon: mdi:pause
                tap_action:
                  action: call-service
                  service: media_player.media_pause
                  target:
                    entity_id: *samsungtv_player
              - type: button
                entity: *samsungtv_player
                name: Stop
                icon: mdi:stop
                tap_action:
                  action: call-service
                  service: media_player.media_stop
                  target:
                    entity_id: *samsungtv_player
              - type: button
                entity: *samsungtv_player
                name: Prev
                icon: mdi:skip-previous
                tap_action:
                  action: call-service
                  service: media_player.media_previous_track
                  target:
                    entity_id: *samsungtv_player
              - type: button
                entity: *samsungtv_player
                name: Next
                icon: mdi:skip-next
                tap_action:
                  action: call-service
                  service: media_player.media_next_track
                  target:
                    entity_id: *samsungtv_player

          # ── Row 10: App shortcuts (launch by display name) ─────────────────
          # entry_id scopes each call to THIS TV only (required with multiple TVs).
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: YT
                icon: mdi:youtube
                tap_action:
                  action: call-service
                  service: samsungtv_max.launch_app
                  data:
                    app_name: YouTube
                    entry_id: REPLACE_ENTRY_ID
              - type: button
                name: Netflix
                icon: mdi:netflix
                tap_action:
                  action: call-service
                  service: samsungtv_max.launch_app
                  data:
                    app_name: Netflix
                    entry_id: REPLACE_ENTRY_ID
              - type: button
                name: Spotify
                icon: mdi:spotify
                tap_action:
                  action: call-service
                  service: samsungtv_max.launch_app
                  data:
                    app_name: Spotify
                    entry_id: REPLACE_ENTRY_ID
              - type: button
                name: Web
                icon: mdi:earth
                tap_action:
                  action: call-service
                  service: samsungtv_max.launch_app
                  data:
                    app_name: Browser
                    entry_id: REPLACE_ENTRY_ID
